<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CilindroSys</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--bg2:#161b27;--bg3:#1e2535;--bg4:#252d40;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#e8ecf4;--text2:#8b95a8;--text3:#5a6476;--accent:#3d7fff;--accent2:#2d6be8;--green:#22c55e;--green-bg:rgba(34,197,94,0.12);--yellow:#f59e0b;--yellow-bg:rgba(245,158,11,0.12);--red:#ef4444;--red-bg:rgba(239,68,68,0.12);--orange:#f97316;--orange-bg:rgba(249,115,22,0.12);--blue:#3d7fff;--blue-bg:rgba(61,127,255,0.12);--purple:#a78bfa;--purple-bg:rgba(167,139,250,0.12);--teal:#2dd4bf;--teal-bg:rgba(45,212,191,0.12);--radius:10px;--radius-sm:6px;--radius-lg:14px;--shadow:0 4px 24px rgba(0,0,0,0.4)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.brand{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.brand-name{font-size:16px;font-weight:600;color:var(--text);letter-spacing:-.3px}
.brand-sub{font-size:11px;color:var(--text3);margin-top:2px}
.nav-section{padding:12px 10px 6px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);font-size:13px;transition:all .15s;margin:1px 8px;border:none;background:none;width:calc(100% - 16px);text-align:left;font-family:inherit}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--accent);font-weight:500}
.nav-item svg{width:16px;height:16px;flex-shrink:0;stroke-width:1.8}
.nav-badge{margin-left:auto;background:var(--red-bg);color:var(--red);font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px}
.sidebar-bottom{margin-top:auto;padding:12px;border-top:1px solid var(--border)}
.topbar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--bg);position:sticky;top:0;z-index:10}
.page-title{font-size:17px;font-weight:600;color:var(--text);flex:1}
.topbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.btn:hover{background:var(--bg4);color:var(--text);border-color:var(--border2)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent2)}
.btn.primary:hover{background:var(--accent2)}
.btn.danger{background:var(--red-bg);color:var(--red);border-color:rgba(239,68,68,0.25)}
.btn.danger:hover{background:rgba(239,68,68,0.2)}
.btn svg{width:13px;height:13px;stroke-width:2}
.search-wrap{position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text3);stroke-width:2}
.search-wrap input{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px 7px 32px;color:var(--text);font-size:13px;font-family:inherit;outline:none;width:220px;transition:border .15s}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap input:focus{border-color:var(--accent);background:var(--bg2)}
.content{padding:20px 24px;flex:1}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:border .2s}
.metric-card:hover{border-color:var(--border2)}
.metric-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.metric-label svg{width:13px;height:13px;stroke-width:2}
.metric-value{font-size:28px;font-weight:600;line-height:1;letter-spacing:-1px}
.metric-sub{font-size:11px;color:var(--text3);margin-top:4px}
.mv-green{color:var(--green)}.mv-red{color:var(--red)}.mv-yellow{color:var(--yellow)}.mv-blue{color:var(--blue)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em}
.alerts-list{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.alert-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s}
.alert-row:hover{border-color:var(--border2);background:var(--bg3)}
.alert-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ad-red{background:var(--red)}.ad-orange{background:var(--orange)}.ad-yellow{background:var(--yellow)}
.alert-code{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);min-width:78px}
.alert-desc{font-size:12px;color:var(--text2);flex:1}
.alert-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.ab-red{background:var(--red-bg);color:var(--red)}.ab-orange{background:var(--orange-bg);color:var(--orange)}.ab-yellow{background:var(--yellow-bg);color:var(--yellow)}
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;background:var(--bg3);border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg3)}
tbody td{padding:9px 14px;font-size:13px;vertical-align:middle}
.td-mono{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2)}
.status-pill{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:3px 8px;border-radius:10px}
.sp-ok{background:var(--green-bg);color:var(--green)}.sp-low{background:var(--yellow-bg);color:var(--yellow)}.sp-crit{background:var(--red-bg);color:var(--red)}.sp-blue{background:var(--blue-bg);color:var(--blue)}
.row-accent-red td:first-child{border-left:3px solid var(--red)}
.row-accent-yellow td:first-child{border-left:3px solid var(--yellow)}
.row-accent-green td:first-child{border-left:3px solid var(--green)}
.machine-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;transition:border .15s}
.machine-card:hover{border-color:var(--border2)}
.machine-header{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;user-select:none;transition:background .1s;border-radius:var(--radius);position:relative}
.machine-header:hover{background:var(--bg3)}
.chevron{width:14px;height:14px;color:var(--text3);flex-shrink:0;transition:transform .2s}
.chevron.open{transform:rotate(90deg)}
.m-name{font-size:13px;font-weight:600;color:var(--text)}
.m-tags{display:flex;gap:5px;align-items:center;margin-left:4px;flex-wrap:wrap}
.mtag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;white-space:nowrap}
.mtag-dupla{background:var(--purple-bg);color:var(--purple)}.mtag-simples{background:var(--bg4);color:var(--text3)}.mtag-qtd{background:var(--green-bg);color:var(--green)}.mtag-zero{background:var(--yellow-bg);color:var(--yellow)}
.m-icon-btn{background:none;border:none;cursor:pointer;padding:5px;border-radius:var(--radius-sm);color:var(--text3);display:inline-flex;opacity:0;transition:all .15s;flex-shrink:0;margin-left:auto}
.machine-header:hover .m-icon-btn{opacity:1}
.m-icon-btn:hover{background:var(--bg4);color:var(--text)}
.m-icon-btn svg{width:14px;height:14px;stroke-width:2}
.machine-body{border-top:1px solid var(--border);overflow:hidden;border-radius:0 0 var(--radius) var(--radius)}
.grupo-section{border-bottom:1px solid var(--border)}
.grupo-section:last-child{border-bottom:none}
.grupo-header{display:flex;align-items:center;gap:8px;padding:6px 16px 6px 36px;background:var(--bg3)}
.grupo-icon{width:12px;height:12px;stroke-width:2;flex-shrink:0}
.grupo-label{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;flex:1}
.gl-comum{color:var(--text3)}.gl-dir{color:var(--blue)}.gl-esq{color:var(--teal)}
.grupo-count{font-size:10px;color:var(--text3)}
.cil-row{display:flex;align-items:center;gap:8px;padding:8px 16px 8px 52px;transition:background .1s}
.cil-row:hover{background:var(--bg3)}
.cil-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cd-comum{background:var(--text3)}.cd-dir{background:var(--blue)}.cd-esq{background:var(--teal)}
.cil-code{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);min-width:76px}
.cil-parte{font-size:12px;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.parte-pill{font-size:10px;font-weight:500;padding:2px 7px;border-radius:8px;white-space:nowrap}
.pp-fe{background:var(--blue-bg);color:var(--blue)}.pp-ma{background:var(--green-bg);color:var(--green)}.pp-re{background:var(--yellow-bg);color:var(--yellow)}.pp-av{background:var(--purple-bg);color:var(--purple)}.pp-el{background:var(--orange-bg);color:var(--orange)}.pp-pr{background:var(--teal-bg);color:var(--teal)}.pp-ou{background:var(--bg4);color:var(--text3)}
.pp-bl{background:rgba(167,139,250,0.15);color:#c4b5fd}
.life-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;white-space:nowrap}
.lp-ok{background:var(--green-bg);color:var(--green)}.lp-mid{background:var(--yellow-bg);color:var(--yellow)}.lp-old{background:var(--red-bg);color:var(--red)}.lp-none{background:var(--bg4);color:var(--text3)}
.cil-actions{display:flex;gap:3px;opacity:0;transition:opacity .15s}
.cil-row:hover .cil-actions{opacity:1}
.cil-act-btn{background:none;border:none;cursor:pointer;padding:4px;border-radius:var(--radius-sm);color:var(--text3);display:inline-flex;transition:all .12s}
.cil-act-btn:hover{background:var(--bg4);color:var(--text)}
.cil-act-btn svg{width:13px;height:13px;stroke-width:2}
.add-cil-row{padding:6px 16px 6px 52px}
.add-cil-btn{background:none;border:none;cursor:pointer;font-size:11px;color:var(--text3);display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:var(--radius-sm);font-family:inherit;transition:all .12s}
.add-cil-btn:hover{background:var(--bg4);color:var(--text2)}
.add-cil-btn svg{width:12px;height:12px;stroke-width:2.5}
.empty-cil{padding:8px 52px;font-size:12px;color:var(--text3);font-style:italic}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:flex-start;justify-content:center;padding:48px 16px;backdrop-filter:blur(2px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:24px;width:100%;max-width:420px;box-shadow:var(--shadow);animation:mopen .18s ease-out;max-height:85vh;overflow-y:auto}
@keyframes mopen{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.modal-title svg{width:16px;height:16px;stroke-width:2;color:var(--accent)}
.form-row{margin-bottom:14px}
.form-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:block}
.form-row input,.form-row select,.form-row textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border .15s}
.form-row input::placeholder,.form-row textarea::placeholder{color:var(--text3)}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent)}
.form-row select option{background:var(--bg3)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.radio-group{display:flex;gap:6px;flex-wrap:wrap}
.radio-opt{flex:1;min-width:80px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 10px;cursor:pointer;text-align:center;font-size:12px;color:var(--text3);user-select:none;line-height:1.4;transition:all .15s}
.radio-opt:hover{border-color:var(--border2);background:var(--bg3);color:var(--text2)}
.radio-opt.sel{border-color:var(--accent);background:var(--blue-bg);color:var(--accent);font-weight:500}
.radio-opt small{display:block;font-size:10px;opacity:.7;margin-top:2px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
.divider{height:1px;background:var(--border);margin:16px 0}
.stat-row{display:flex;gap:8px;margin-bottom:16px}
.stat-box{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;text-align:center}
.stat-num{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-0.5px}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:2px}
.hist-list{max-height:180px;overflow-y:auto;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm)}
.hist-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:12px}
.hist-row:last-child{border-bottom:none}
.hist-date{color:var(--text3);min-width:76px;font-family:'DM Mono',monospace;font-size:11px}
.hist-dias{font-weight:600;color:var(--text);min-width:44px}
.hist-note{color:var(--text2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}
.empty-hist{padding:16px;text-align:center;font-size:12px;color:var(--text3)}
.info-text{font-size:12px;color:var(--text3);margin-top:8px;line-height:1.6}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filter-btn{font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;font-family:inherit}
.filter-btn:hover{border-color:var(--border2);color:var(--text2)}
.filter-btn.on{background:var(--blue-bg);border-color:var(--accent);color:var(--accent)}
.conserto-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:8px;transition:border .15s}
.conserto-card:hover{border-color:var(--border2)}
.cc-left{flex:1;min-width:0}
.cc-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cc-sub{font-size:11px;color:var(--text3);display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}
.cc-sub svg{width:11px;height:11px;stroke-width:2}
.cc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.dias-badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:var(--radius-sm)}
.db-ok{background:var(--green-bg);color:var(--green)}.db-warn{background:var(--orange-bg);color:var(--orange)}.db-danger{background:var(--red-bg);color:var(--red)}
.cc-actions{display:flex;gap:6px;flex-wrap:wrap}
.empty-state{text-align:center;padding:48px 24px;color:var(--text3)}
.empty-state svg{width:40px;height:40px;stroke-width:1.2;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg4);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 16px;font-size:13px;color:var(--text);box-shadow:var(--shadow);z-index:300;display:flex;align-items:center;gap:8px;animation:tshow .2s ease;max-width:300px}
.toast.hide{animation:thide .2s ease forwards}
@keyframes tshow{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes thide{to{opacity:0;transform:translateY(8px)}}
.lobby{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:0}
.lobby-hidden{display:none}
.lobby-brand{font-size:28px;font-weight:700;color:var(--text);letter-spacing:-.5px;margin-bottom:6px}
.lobby-sub{font-size:14px;color:var(--text3);margin-bottom:48px}
.lobby-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;padding:0 24px}
.filial-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 32px;cursor:pointer;transition:all .2s;min-width:180px;text-align:center;position:relative;overflow:hidden}
.filial-card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.5)}
.filial-card-sigla{font-size:36px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
.filial-card-nome{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.filial-card-maq{font-size:12px;color:var(--text3)}
.filial-card-bar{position:absolute;bottom:0;left:0;right:0;height:3px}
.lobby-footer{font-size:11px;color:var(--text3);margin-top:48px}
.save-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;border-top:1px solid var(--border)}
.save-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px}
.save-status.saved{color:var(--green)}
.save-status.unsaved{color:var(--yellow)}
.save-status svg{width:13px;height:13px;stroke-width:2}
.toast-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tag-pill{display:inline-flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;background:rgba(45,212,191,0.12);color:var(--teal);border:1px solid rgba(45,212,191,0.25);white-space:nowrap}
.tag-pill svg{width:10px;height:10px;stroke-width:2.5}
.tag-none{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)}
.tag-hist-event{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.tag-hist-event:last-child{border-bottom:none}
.tag-hist-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.tag-hist-icon svg{width:13px;height:13px;stroke-width:2}
.thi-inst{background:var(--green-bg);color:var(--green)}
.thi-troca{background:var(--yellow-bg);color:var(--yellow)}
.thi-conserto{background:var(--orange-bg);color:var(--orange)}
.thi-retorno{background:var(--blue-bg);color:var(--blue)}
.tag-hist-body{flex:1;min-width:0}
.tag-hist-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.tag-hist-sub{font-size:11px;color:var(--text3)}
[data-tip]{position:relative}
[data-tip]:hover::after{content:attr(data-tip);position:fixed;background:var(--bg4);color:var(--text);font-size:11px;padding:4px 8px;border-radius:var(--radius-sm);white-space:nowrap;pointer-events:none;border:1px solid var(--border2);z-index:9999;transform:translateX(-50%);margin-top:4px}
</style>
</head>
<body>
<div class="lobby" id="lobby">
  <div class="lobby-brand">&#9607; CilindroSys</div>
  <div class="lobby-sub">Gestão de cilindros hidráulicos — selecione a filial</div>
  <div class="lobby-cards" id="lobby-cards"></div>
  <div class="lobby-footer">Grupo G&G</div>
</div>
<div class="app">
<aside class="sidebar">
  <div class="brand">
    <div class="brand-name">&#9607; CilindroSys</div>

function gasGetFilialKey(){
  if(currentFilial&&FILIAIS[currentFilial])return FILIAIS[currentFilial].nome;
  return 'G&G MATRIZ';

function setSaveStatus(state,msg){
  var label=document.getElementById('save-label');
  var status=document.getElementById('save-status');
  if(label)label.textContent=msg;
  if(status){
    status.className='save-status';
    if(state==='saved')status.classList.add('saved');
    else if(state==='unsaved')status.classList.add('unsaved');
  }
}

async function gasSave(){
  if(!GAS_URL)return;
  var filial=gasGetFilialKey();
  var savedAt=new Date().toISOString();
  var payload={inventario:inventario,consertos:consertos,machines:machines,cabeçotes:cabeçotes,config:CONFIG,savedAt:savedAt};
  var postData=JSON.stringify({filial:filial,data:payload});
  setSaveStatus('unsaved','Salvando...');
  try{
    var saved=false;
    await new Promise(function(res){
      var xhr=new XMLHttpRequest();
      xhr.open('POST',GAS_URL,true);
      xhr.timeout=8000;
      xhr.onload=function(){saved=true;res();};
      xhr.onerror=function(){res();};
      xhr.ontimeout=function(){res();};
      try{xhr.send(postData);}catch(e){res();}
    });
    if(!saved){
      try{
        await fetch(GAS_URL,{method:'POST',mode:'no-cors',body:postData});
        saved=true;
      }catch(e){}
    }
    if(saved){
      _lastSavedAt=savedAt;
      var d=new Date(savedAt);
      var ds=d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
      setSaveStatus('saved','Atualizado: '+ds);
    } else {
      setSaveStatus('unsaved','Sem conexão');
    }
  }catch(e){
    setSaveStatus('unsaved','Erro ao salvar');
  }
}

function gasLoad(){
  if(!GAS_URL)return;
  var filial=gasGetFilialKey();
  _gasLoad(filial).then(function(data){
    if(!data){setSaveStatus('','Sem dados na nuvem');return;}
    var h='<div class="modal-title">Carregar da nuvem ☁</div>';
    h+='<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--text2)">';
    h+='Filial: <strong style="color:var(--text)">'+filial+'</strong><br>';
    if(data.savedAt)h+='Salvo em: '+new Date(data.savedAt).toLocaleString('pt-BR')+'<br>';
    if(data.inventario)h+=(data.inventario.length||0)+' itens &nbsp;·&nbsp; ';
    if(data.consertos)h+=(data.consertos.length||0)+' consertos &nbsp;·&nbsp; ';
    if(data.machines)h+=Object.keys(data.machines).length+' máquinas';
    h+='</div>';
    h+='<div style="background:var(--red-bg);border:1px solid rgba(239,68,68,0.25);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:14px">⚠ Substituirá todos os dados atuais.</div>';
    h+='<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" id="btn-gas-confirm">Carregar</button></div>';
    showModal(h);
    var saved=data;
    document.getElementById('btn-gas-confirm').onclick=function(){
      if(saved.inventario)inventario=saved.inventario;
      if(saved.consertos)consertos=saved.consertos;
      if(saved.machines)Object.keys(saved.machines).forEach(function(m){machines[m]=saved.machines[m];if(!expanded.hasOwnProperty(m))expanded[m]=false;});
      if(saved.config)Object.assign(CONFIG,saved.config);
      if(saved.savedAt)_lastSavedAt=saved.savedAt;
      closeModal();
      var d=new Date(saved.savedAt||Date.now());
      var ds=d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
      setSaveStatus('saved','Atualizado: '+ds);
      showToast('Dados carregados da nuvem ☁','var(--green)');
      showPage(currentPage||'dashboard');
      updateBadges();
    };
  });
}

function syncMaquinas(){
  // Rebuild maquinas from machines structure only — always overwrites
  inventario.forEach(function(item){
    var set={};
    Object.keys(machines).forEach(function(mName){
      machines[mName].cils.forEach(function(c){
        if(c.cod===item.cod){
          set[mName.replace('SOP-','')]=1;
        }
      });
    });
    item.maquinas=Object.keys(set).sort(function(a,b){return parseInt(a)-parseInt(b);}).join(',');
  });
}

function countInstalados(cod){
  var total=0;
  var filialMaqs=window._filialMaquinas;
  Object.keys(machines).forEach(function(mName){
    if(filialMaqs&&filialMaqs.indexOf(mName)<0)return;
    machines[mName].cils.forEach(function(c){if(c.cod===cod)total++;});
  });
  return total;
}

const statusInv=item=>{
  const apr=consertos.filter(c=>c.cilindro_id===item.id&&c.status==='APROVADO').reduce((s,c)=>s+c.qtd,0);
  if(item.atual===0&&apr===0)return'critico';
  if(item.atual<item.ideal){return(item.atual+apr)>=item.ideal?'suprido':'baixo';}
  return'ok';
};

function renderTagCard(m,c,i){
  const posL=c.posicao==='dir'?'Mesa 01':c.posicao==='esq'?'Mesa 02':'Sistema comum';
  const d=c.instalado?daysBetween(c.instalado,today()):null;
  const lp=d===null?'lp-none':d<60?'lp-ok':d<120?'lp-mid':'lp-old';
  // consertos linked to this cod+tag
  const myConsertos=consertos.filter(co=>{
    if(c.tag&&co.tag&&co.tag===c.tag)return true;
    return co.cod===c.cod&&co.origem_maquina===m;
  });
  const ativos=myConsertos.filter(co=>co.status==='APROVADO'||co.status==='ORCAMENTO');
  // build timeline events
  let events=[];
  const allDates=[...c.trocas.map(t=>t.data),c.instalado].filter(Boolean).sort();
  if(allDates.length){
    events.push({type:'inst',date:allDates[0],title:'Instalação registrada',sub:m+' · '+posL+(c.cod?' · Cód: '+c.cod:'')});
  }
  c.trocas.forEach(t=>{
    events.push({type:'troca',date:t.data,title:'Troca registrada',sub:'Vida útil: '+t.dias+'d · Motivo: '+t.nota+(t.tagAnt&&t.tagAnt!==c.tag?' · TAG ant.: '+t.tagAnt:'')});
  });
  myConsertos.forEach(co=>{
    const tipo=co.tipo==='INTERNO'?'Manutenção interna':'Conserto externo';

function showPage(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const nb=document.getElementById('nav-'+page);if(nb)nb.classList.add('active');
  if(page==='dashboard')renderDashboard();
  else if(page==='inventario')renderInventario();
  else if(page==='consertos')renderConsertos();
  else if(page==='maquinas')renderMaquinas();
  else if(page==='cabeçotes')renderCabeçotes();
  else if(page==='cronograma')renderCronograma();
  else if(page==='tags')renderTags();
  else if(page==='relatorios')renderRelatorios();
  else if(page==='config')renderConfig();
  updateBadges();
}

function renderConsertos(){
  var list=consertos.filter(function(c){
    if(consertoFilter==='pendentes')return c.status==='PENDENTE';
    if(consertoFilter==='ativos')return c.status==='APROVADO'||c.status==='ORCAMENTO';
    if(consertoFilter==='historico')return c.status==='CONCLUIDO'||c.status==='CANCELADO';
    return true;
  });
  var pendentes=consertos.filter(function(c){return c.status==='PENDENTE';}).length;
  var ativos=consertos.filter(function(c){return c.status==='APROVADO'||c.status==='ORCAMENTO';}).length;
  var main=document.getElementById('main-content');
  var topbar=document.createElement('div');topbar.className='topbar';
  topbar.innerHTML='<span class="page-title">Consertos</span><div class="topbar-actions"><button class="btn primary" id="btn-new-c"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:13px;height:13px;stroke-width:2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Registrar</button></div>';
  var content=document.createElement('div');content.className='content';
  var fb=document.createElement('div');fb.className='filters';
  [{k:'pendentes',l:'Pendentes ('+pendentes+')'},{k:'ativos',l:'Ativos ('+ativos+')'},{k:'todos',l:'Todos'},{k:'historico',l:'Historico'}].forEach(function(x){
    var b=document.createElement('button');b.className='filter-btn'+(consertoFilter===x.k?' on':'');
    b.textContent=x.l;(function(k){b.onclick=function(){consertoFilter=k;renderConsertos();};})(x.k);fb.appendChild(b);
  });
  content.appendChild(fb);
  if(!list.length){var e=document.createElement('div');e.className='empty-state';e.innerHTML='<p>Nenhum conserto nesta lista</p>';content.appendChild(e);}
  list.forEach(function(c){
    var dias=diasC(c);
    var atrasado=dias>CONFIG.dias_alerta_conserto&&(c.status==='APROVADO'||c.status==='ORCAMENTO');
    var stBg=c.status==='APROVADO'?'var(--green-bg)':c.status==='ORCAMENTO'?'var(--yellow-bg)':c.status==='PENDENTE'?'var(--teal-bg)':c.status==='CONCLUIDO'?'var(--blue-bg)':'var(--bg4)';
    var stColor=c.status==='APROVADO'?'var(--green)':c.status==='ORCAMENTO'?'var(--yellow)':c.status==='PENDENTE'?'var(--teal)':c.status==='CONCLUIDO'?'var(--blue)':'var(--text3)';
    var dbc=dias<15?'db-ok':atrasado?'db-danger':'db-warn';
    var tipoH=c.tipo==='INTERNO'?'<span style="color:var(--blue)">Manutencao interna</span>':c.tipo==='EXTERNO'?'<span style="color:var(--orange)">Conserto externo</span>':'';
    var tagH=c.tag?tagBadge(c.tag):'';
    var oriH=c.origem_maquina?'<span style="color:var(--text3)">'+c.origem_maquina+(c.origem_posicao?' - '+c.origem_posicao:'')+'</span>':'';
    var fornH=(c.fornecedor&&c.fornecedor!=='—')?'<span>'+c.fornecedor+'</span>':'';
    var obsH=c.obs?'<span>'+c.obs+'</span>':'';
    var card=document.createElement('div');card.className='conserto-card';
    if(atrasado)card.style.borderColor='rgba(239,68,68,0.4)';
    else if(c.status==='PENDENTE')card.style.borderColor='rgba(45,212,191,0.3)';
    var left=document.createElement('div');left.className='cc-left';
    left.innerHTML='<div class="cc-title"><span class="td-mono" style="font-size:12px">'+c.cod+'</span>'+tagH+'<span>'+c.parte+'</span><span style="font-size:11px;color:var(--text3)">'+c.med+'</span><span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;background:'+stBg+';color:'+stColor+'">'+c.status+'</span></div><div class="cc-sub"><span>'+(c.status==='PENDENTE'?'Removido em: ':'Enviado: ')+fmt(c.data_envio)+'</span>'+tipoH+fornH+oriH+obsH+'<span>Qtd: '+c.qtd+'</span></div>';
    var right=document.createElement('div');right.className='cc-right';
    var badge=document.createElement('span');badge.className='dias-badge '+dbc;badge.textContent=dias+'d';
    var acts=document.createElement('div');acts.className='cc-actions';
    if(c.status==='PENDENTE'){var b=document.createElement('button');b.className='btn primary';b.style.cssText='font-size:11px;padding:5px 10px;background:var(--teal);border-color:var(--teal);color:#fff';b.innerHTML='&#8594; Direcionar';(function(id){b.onclick=function(){openDirecionar(id);};})(c.id);acts.appendChild(b);}
    if(c.status==='ORCAMENTO'){var b=document.createElement('button');b.className='btn';b.style.cssText='font-size:11px;padding:5px 10px';b.textContent='Aprovar';(function(id){b.onclick=function(){aprovarC(id);};})(c.id);acts.appendChild(b);}
    if(c.status==='APROVADO'){var b=document.createElement('button');b.className='btn primary';b.style.cssText='font-size:11px;padding:5px 10px';b.textContent='Registrar retorno';(function(id){b.onclick=function(){openRetorno(id);};})(c.id);acts.appendChild(b);}
    if(c.status!=='CONCLUIDO'&&c.status!=='CANCELADO'){var b=document.createElement('button');b.className='btn danger';b.style.cssText='font-size:11px;padding:5px 10px';b.textContent='Cancelar';(function(id){b.onclick=function(){cancelarC(id);};})(c.id);acts.appendChild(b);}
    right.appendChild(badge);right.appendChild(acts);card.appendChild(left);card.appendChild(right);content.appendChild(card);
  });
  main.innerHTML='';main.appendChild(topbar);main.appendChild(content);
  document.getElementById('btn-new-c').onclick=openNovoConsertoGeral;
}

function saveAddCilMaq(m){
  var cod=document.getElementById('f-cod').value.trim();if(!cod)return;
  var tagV=(document.getElementById('f-tag')?.value.trim())||'';
  var parte=document.getElementById('f-parte').value;
  var med=document.getElementById('f-med').value.trim();
  var posicao=modalCtx.posSel||'comum';
  var instalado=document.getElementById('f-inst').value;
  machines[m].cils.push({cod:cod,tag:tagV,parte:parte,med:med,posicao:posicao,instalado:instalado,trocas:[]});
  machines[m].cils.sort(function(a,b){return parteOrder(a.parte)-parteOrder(b.parte);});
  expanded[m]=true;
  var jaExiste=inventario.some(function(i){return i.cod===cod&&i.parte===parte;});
  if(!jaExiste){
    closeModal();
    var h='<div class="modal-title">Cilindro vinculado!</div>';

    h+='<div style="font-size:12px;color:var(--text3)">'+med+'</div></div>';
    h+='<p style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:4px">Este código ainda não está no inventário. Deseja cadastrá-lo para controle de estoque?</p>';
    h+='<div class="modal-actions">';
    h+='<button class="btn" id="btn-skip-inv">Não, apenas vincular</button>';
    h+='<button class="btn primary" id="btn-add-inv-now">Sim, cadastrar no inventário</button>';
    h+='</div>';
    showModal(h);
    document.getElementById('btn-skip-inv').onclick=function(){closeModal();showToast('Cilindro vinculado');renderMaquinas();gasSave();};
    document.getElementById('btn-add-inv-now').onclick=function(){
      var maq=m.replace('SOP-','');
      inventario.push({id:'c'+Date.now(),cod:cod,sop:'',parte:parte,med:med,ideal:0,atual:0,maquinas:maq});
      closeModal();
      showToast('Adicionado ao inventário! Defina o estoque ideal em Relatórios.','var(--teal)');
      renderMaquinas();updateBadges();
    };
    // Also if exists, update maquinas field
    var existingItem=inventario.find(function(i){return i.cod===cod&&i.parte===parte;});
    if(existingItem){
      var maqNum=m.replace('SOP-','');
      if(existingItem.maquinas&&existingItem.maquinas.length>0){
        if(!existingItem.maquinas.split(',').includes(maqNum))
          existingItem.maquinas=existingItem.maquinas+','+maqNum;
      } else { existingItem.maquinas=maqNum; }
    }
  } else {
    syncMaquinas();
  closeModal();showToast('Cilindro vinculado');renderMaquinas();
  }
}

function saveTroca(){
  const {m,i}=modalCtx;
  const c=machines[m].cils[i];
  const dataT=document.getElementById('f-tdata').value||today();
  const dias=c.instalado?daysBetween(c.instalado,dataT):0;
  const motivo=document.getElementById('f-tnota').value||'\u2014';
  const novoTag=document.getElementById('f-tnewcod').value.trim();
  const novaTag=(document.getElementById('f-tnewcod-tag')?.value.trim())||'';
  // save removed cylinder info before updating
  const codRemovido=c.cod;
  const tagRemovido=c.tag||'';
  // register in troca history
  c.trocas.push({data:dataT,dias,nota:motivo,codAnt:codRemovido,tagAnt:tagRemovido});
  // update installed cylinder
  c.instalado=dataT;
  if(novoTag)c.cod=novoTag;
  if(novaTag)c.tag=novaTag;
  // create PENDENTE conserto for removed cylinder
  const item=inventario.find(iv=>iv.cod===codRemovido);
  consertos.push({
    id:'co'+Date.now(),
    cilindro_id:item?item.id:'',
    cod:codRemovido,
    tag:tagRemovido,
    parte:c.parte,
    med:c.med,
    qtd:1,
    status:'PENDENTE',
    tipo:'',
    data_envio:dataT,
    fornecedor:'',
    obs:motivo,
    origem_maquina:m,
    origem_posicao:c.posicao==='dir'?'Mesa 01':c.posicao==='esq'?'Mesa 02':'Sistema comum',
  });
  closeModal();
  showToast('Troca registrada ('+dias+'d) \u2192 pendente em Consertos','var(--teal)');
  consertoFilter='pendentes';
  showPage('consertos');
  updateBadges();
}

function renderRelatorios(){
  const main=document.getElementById('main-content');

  /* ── topbar ── */
  const topbar=document.createElement('div');
  topbar.className='topbar';
  topbar.innerHTML='<span class="page-title">Relat\u00f3rios</span><div class="topbar-actions" id="rel-actions"></div>';

  /* ── content wrapper ── */
  const content=document.createElement('div');
  content.className='content';

  /* ── summary cards ── */
  const totalE=inventario.reduce(function(s,i){return s+i.atual;},0);
  const totalI=inventario.reduce(function(s,i){return s+i.ideal;},0);
  const gapTotal=totalI-totalE;
  const ativos=consertos.filter(function(c){return c.status==='APROVADO'||c.status==='ORCAMENTO';}).length;
  const mg=document.createElement('div');mg.className='metrics-grid';mg.style.marginBottom='24px';
  [{v:totalE,l:'Total em estoque',c:'mv-blue',s:inventario.length+' SKUs'},{v:(gapTotal>0?'+':'')+gapTotal,l:'Gap de estoque',c:gapTotal>0?'mv-red':'mv-green',s:gapTotal>0?'unidades faltando':'estoque completo'},{v:ativos,l:'Consertos ativos',c:'mv-yellow',s:consertos.filter(function(c){return c.status==='CONCLUIDO';}).length+' conclu\u00eddos'}].forEach(function(m){
    const card=document.createElement('div');card.className='metric-card';
    card.innerHTML='<div class="metric-label">'+m.l+'</div><div class="metric-value '+m.c+'">'+m.v+'</div><div class="metric-sub">'+m.s+'</div>';
    mg.appendChild(card);
  });
  content.appendChild(mg);

  /* ── per-parte sections ── */
  ['Fechamento','Mandril','Rebarbador','Avan\u00e7o/Recuo de Mesa','Eleva\u00e7\u00e3o Extrusora','Programador','Bloco de Amortecimento','Outro'].forEach(function(parte){
    const items=inventario.filter(function(i){return i.parte===parte;});

    const section=document.createElement('div');section.style.marginBottom='24px';

    /* section header */
    const hdr=document.createElement('div');hdr.className='section-header';hdr.style.marginBottom='8px';
    const htitle=document.createElement('span');htitle.className='section-title';htitle.textContent=parte;
    const hadd=document.createElement('button');hadd.className='btn';hadd.style.cssText='font-size:11px;padding:4px 10px';
    hadd.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:12px;height:12px;stroke-width:2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add';
    (function(p){hadd.onclick=function(){openEditCilindro(null,p);};})(parte);
    hdr.appendChild(htitle);hdr.appendChild(hadd);
    section.appendChild(hdr);

    if(!items.length){
      const empty=document.createElement('div');
      empty.style.cssText='font-size:12px;color:var(--text3);padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius)';
      empty.textContent='Nenhum item cadastrado';
      section.appendChild(empty);content.appendChild(section);return;
    }

    /* table */
    const tw=document.createElement('div');tw.className='table-wrap';
    const tbl=document.createElement('table');
    tbl.style.tableLayout='fixed';

    /* thead — 10 cols, widths sum ~100% */

        inp.onfocus=function(){inp.style.background='var(--bg3)';inp.style.borderRadius='4px';inp.style.padding='2px 4px';};
        inp.onblur=function(){
          inp.style.background='transparent';inp.style.padding='0';inp.style.borderRadius='0';
          item[field]=isNum?parseInt(inp.value)||0:inp.value;
          renderRelatorios();updateBadges();
        };
        inp.onkeydown=function(e){if(e.key==='Enter')inp.blur();};
        td.appendChild(inp);return td;
      }

      /* col 1 – Código (mono) */
      var td1=editCell(item.cod,false,'cod','left');
      td1.style.fontFamily='DM Mono,monospace';td1.querySelector('input').style.fontFamily='DM Mono,monospace';td1.style.fontSize='11px';
      tr.appendChild(td1);

      /* col 2 – Medidas (mono) */
      var td2=editCell(item.med,false,'med','left');

      tr.appendChild(td2);

      /* col 3 – SOP */
      tr.appendChild(editCell(item.sop,false,'sop','left'));

      /* col 4 – Máquinas */
      tr.appendChild(editCell(item.maquinas||'',false,'maquinas','left'));

      /* col 5 – Atual */
      var tdA=editCell(item.atual,true,'atual','center');
      tdA.querySelector('input').style.fontWeight='600';
      tdA.querySelector('input').style.color=item.atual===0?'var(--red)':'var(--text)';
      tr.appendChild(tdA);

      /* col 6 – Ideal */
      var tdId=editCell(item.ideal,true,'ideal','center');
      tdId.querySelector('input').style.color='var(--text3)';

      /* col 7 – Em máquina */
      var emMaq=countInstalados(item.cod);

        tdMaq.innerHTML='<span style="color:var(--text3);font-size:12px">—</span>';
      }
      tr.appendChild(tdMaq);

      /* col 8 – Conserto */
      var emCons=consertos.filter(function(c){
        return c.cilindro_id===item.id&&(c.status==='APROVADO'||c.status==='ORCAMENTO'||c.status==='PENDENTE');
      }).reduce(function(s,c){return s+c.qtd;},0);
      var tdCo=document.createElement('td');tdCo.style.textAlign='center';
      if(emCons>0){
        var badge=document.createElement('span');
        badge.style.cssText='font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px;background:var(--orange-bg);color:var(--orange);cursor:pointer;display:inline-block';
        badge.textContent=emCons;badge.title='Ver consertos';
        badge.onclick=function(){consertoFilter='ativos';showPage('consertos');};
        tdCo.appendChild(badge);
      } else {
        tdCo.innerHTML='<span style="color:var(--text3);font-size:12px">\u2014</span>';
      }
      tr.appendChild(tdCo);

      /* col 9 – Gap */
      var tdGap=document.createElement('td');tdGap.style.cssText='text-align:center;font-weight:600;color:'+(gap>0?'var(--red)':gap<0?'var(--green)':'var(--text3)');
      tdGap.textContent=gap>0?'+'+gap:(gap===0?'0':gap);
      tr.appendChild(tdGap);

      /* col 10 – Status */
      var stBg=st==='critico'?'var(--red-bg)':st==='baixo'?'var(--yellow-bg)':st==='suprido'?'var(--blue-bg)':'var(--green-bg)';
      var stCl=st==='critico'?'var(--red)':st==='baixo'?'var(--yellow)':st==='suprido'?'var(--blue)':'var(--green)';
      var tdSt=document.createElement('td');tdSt.style.textAlign='center';
      var pill=document.createElement('span');pill.className='status-pill';
      pill.style.cssText='background:'+stBg+';color:'+stCl;
      pill.textContent=st==='critico'?'Cr\u00edtico':st==='baixo'?'Baixo':st==='suprido'?'Suprido':'OK';
      tdSt.appendChild(pill);tr.appendChild(tdSt);

      /* col 11 – Ações */
      var tdAct=document.createElement('td');tdAct.style.textAlign='center';
      var acts=document.createElement('div');acts.style.cssText='display:flex;gap:4px;justify-content:center';
      var bEdit=document.createElement('button');bEdit.className='btn';bEdit.style.padding='4px 8px';
      bEdit.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:12px;height:12px;stroke-width:2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
      (function(id){bEdit.onclick=function(){openEditCilindro(id);};})(item.id);
      var bDel=document.createElement('button');bDel.className='btn danger';bDel.style.padding='4px 8px';
      bDel.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:12px;height:12px;stroke-width:2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>';
      (function(id){bDel.onclick=function(){if(confirm('Excluir este cilindro?'))deleteCilindro(id);};})(item.id);
      acts.appendChild(bEdit);acts.appendChild(bDel);tdAct.appendChild(acts);tr.appendChild(tdAct);

      tbody.appendChild(tr);
    });

    tbl.appendChild(tbody);tw.appendChild(tbl);section.appendChild(tw);
    content.appendChild(section);
  });

  /* ── consertos por fornecedor ── */
  var sh2=document.createElement('div');sh2.className='section-header';sh2.style.marginBottom='8px';
  sh2.innerHTML='<span class="section-title">Consertos por fornecedor</span>';

  var tw2=document.createElement('div');tw2.className='table-wrap';tw2.style.marginBottom='20px';
  var fors=[...new Set(consertos.map(function(c){return c.fornecedor;}))].filter(Boolean);
  var tbl2=document.createElement('table');
  tbl2.innerHTML='<thead><tr><th>Fornecedor</th><th style="text-align:center;width:80px">Total</th><th style="text-align:center;width:80px">Ativos</th><th style="text-align:center;width:100px">Conclu\u00eddos</th></tr></thead>';
  var tb2=document.createElement('tbody');
  fors.forEach(function(f){
    var todos=consertos.filter(function(c){return c.fornecedor===f;});
    var at=todos.filter(function(c){return c.status==='APROVADO'||c.status==='ORCAMENTO';}).length;

    tr.innerHTML='<td>'+f+'</td><td style="text-align:center">'+todos.length+'</td><td style="text-align:center;color:var(--yellow)">'+at+'</td><td style="text-align:center;color:var(--green)">'+co+'</td>';
    tb2.appendChild(tr);
  });
  tbl2.appendChild(tb2);tw2.appendChild(tbl2);content.appendChild(tw2);

  main.innerHTML='';
  main.appendChild(topbar);

  // Wire topbar buttons via JS (avoids onclick-in-string issues)

  bRel.style.cssText='background:rgba(34,197,94,0.12);border-color:rgba(34,197,94,0.35);color:#22c55e;font-weight:500';
  bRel.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:14px;height:14px;stroke-width:2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg> Exportar Excel';
  bRel.onclick=exportRelatorio;ra.appendChild(bRel);
  var bAdd=document.createElement('button');bAdd.className='btn primary';
  bAdd.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:13px;height:13px;stroke-width:2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Novo item';
  bAdd.onclick=function(){openEditCilindro(null);};ra.appendChild(bAdd);
}


function renderCabeçotes(){
  var main=document.getElementById('main-content');
  var filialKey=currentFilial||'matriz';
  var filialMaqs=window._filialMaquinas||[];

  // Filter cabeçotes by filial
  var list=cabeçotes.filter(function(c){return c.filial===filialKey;});

  // Stats
  var alocados=list.filter(function(c){return c.sop;}).length;
  var livres=list.filter(function(c){return !c.sop;}).length;
  var emConserto=consertos.filter(function(c){
    return c.status==='APROVADO'||c.status==='ORCAMENTO'||c.status==='PENDENTE';
  }).length; // simplified

  // Topbar
  var topbar=document.createElement('div');topbar.className='topbar';
  var title=document.createElement('span');title.className='page-title';title.textContent='Cabeçotes';
  topbar.appendChild(title);
  var actions=document.createElement('div');actions.className='topbar-actions';
  var sw=document.createElement('div');sw.className='search-wrap';
  sw.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>';
  var sinp=document.createElement('input');sinp.type='text';sinp.id='cab-search';sinp.placeholder='Buscar cabeçote...';
  sinp.oninput=function(){renderCabeçotes();};
  sw.appendChild(sinp);actions.appendChild(sw);
  var bNew=document.createElement('button');bNew.className='btn primary';
  bNew.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:13px;height:13px;stroke-width:2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Novo cabeçote';
  bNew.onclick=function(){openNewCabeçote();};actions.appendChild(bNew);
  topbar.appendChild(actions);

  var content=document.createElement('div');content.className='content';

  // Summary cards
  var mg=document.createElement('div');mg.className='metrics-grid';mg.style.marginBottom='20px';
  [{v:list.length,l:'Total',c:'',s:'cabeçotes na filial'},{v:alocados,l:'Em máquina',c:'mv-green',s:'alocados em SOP'},{v:livres,l:'Fora de linha',c:'mv-yellow',s:'sem SOP alocada'}].forEach(function(m){
    var card=document.createElement('div');card.className='metric-card';
    card.innerHTML='<div class="metric-label">'+m.l+'</div><div class="metric-value '+(m.c||'')+'">'+m.v+'</div><div class="metric-sub">'+m.s+'</div>';
    mg.appendChild(card);
  });
  content.appendChild(mg);

  // Filter tabs
  var q=(document.getElementById('cab-search')||{}).value||'';
  var fb=document.createElement('div');fb.className='filters';fb.style.marginBottom='16px';
  var filtro=window._cabFiltro||'todos';
  [{k:'todos',l:'Todos ('+list.length+')'},{k:'alocado',l:'Em máquina ('+alocados+')'},{k:'livre',l:'Fora de linha ('+livres+')'}].forEach(function(x){
    var b=document.createElement('button');b.className='filter-btn'+(filtro===x.k?' on':'');
    b.textContent=x.l;
    (function(k){b.onclick=function(){window._cabFiltro=k;renderCabeçotes();};})(x.k);
    fb.appendChild(b);
  });
  content.appendChild(fb);

  // Filter + sort: alocados first by SOP number, then fora de linha by cod
  var filtered=list.filter(function(c){
    if(q&&!c.cod.toLowerCase().includes(q.toLowerCase())&&!c.modelo.toLowerCase().includes(q.toLowerCase())&&!c.sop.toLowerCase().includes(q.toLowerCase()))return false;
    if(filtro==='alocado')return !!c.sop;
    if(filtro==='livre')return !c.sop;
    return true;
  }).sort(function(a,b){
    var aHasSop=!!a.sop, bHasSop=!!b.sop;
    if(aHasSop&&!bHasSop)return -1;
    if(!aHasSop&&bHasSop)return 1;
    if(aHasSop&&bHasSop){
      var aNum=parseInt((a.sop||'').replace(/\D/g,''))||0;
      var bNum=parseInt((b.sop||'').replace(/\D/g,''))||0;
      return aNum-bNum;
    }
    return a.cod.localeCompare(b.cod);
  });

  if(!filtered.length){
    var empty=document.createElement('div');empty.className='empty-state';
    empty.innerHTML='<p>Nenhum cabeçote encontrado</p>';
    content.appendChild(empty);
  }

  // Cards grid
  var grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px';

  filtered.forEach(function(cab){
    var card=document.createElement('div');
    card.style.cssText='background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden';
    // Accent bar color
    var accent=cab.sop?'var(--green)':'var(--yellow)';
    card.style.borderLeftColor=accent;card.style.borderLeftWidth='3px';

    // Header
    var hdr=document.createElement('div');
    hdr.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:12px 14px 10px';

    var left=document.createElement('div');
    var codSpan=document.createElement('div');
    codSpan.style.cssText='font-size:14px;font-weight:700;color:var(--text);font-family:DM Mono,monospace';
    codSpan.textContent=cab.cod;
    var modSpan=document.createElement('div');
    modSpan.style.cssText='font-size:11px;color:var(--text3);margin-top:2px';
    modSpan.textContent=cab.modelo||'—';
    left.appendChild(codSpan);left.appendChild(modSpan);

    var right=document.createElement('div');right.style.cssText='display:flex;gap:6px;align-items:center';

    // SOP badge / selector
    var sopWrap=document.createElement('div');
    var sopInput=document.createElement('input');
    sopInput.type='text';sopInput.value=cab.sop||'';
    sopInput.placeholder='SOP-???';
    sopInput.style.cssText='width:80px;font-size:11px;text-align:center;padding:3px 6px;border-radius:var(--radius-sm)';
    sopInput.title='SOP alocada (ex: SOP-039)';
    sopInput.onchange=function(){
      cab.sop=this.value.trim().toUpperCase();
      gasSave();
      renderCabeçotes();
    };
    sopWrap.appendChild(sopInput);right.appendChild(sopWrap);

    // Edit / conserto buttons
    var bEdit=document.createElement('button');bEdit.className='btn';bEdit.style.padding='4px 8px';
    bEdit.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:12px;height:12px;stroke-width:2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    bEdit.title='Editar';(function(c){bEdit.onclick=function(){openEditCabeçote(c.id);};})(cab);
    right.appendChild(bEdit);

    var bDel=document.createElement('button');bDel.className='btn';bDel.style.cssText='padding:4px 8px;color:var(--red)';
    bDel.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:12px;height:12px;stroke-width:2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>';
    bDel.title='Excluir';(function(id){bDel.onclick=function(){if(confirm('Excluir '+cab.cod+'?')){cabeçotes=cabeçotes.filter(function(c){return c.id!==id;});gasSave();renderCabeçotes();}};})(cab.id);
    right.appendChild(bDel);

    hdr.appendChild(left);hdr.appendChild(right);card.appendChild(hdr);

    // SOP status bar
    var statusBar=document.createElement('div');
    statusBar.style.cssText='padding:4px 14px 8px;display:flex;align-items:center;gap:6px;font-size:11px';
    if(cab.sop){
      statusBar.innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block"></span>'
        +'<span style="color:var(--green);font-weight:600">Em máquina:</span>'
        +'<span style="color:var(--text)">'+cab.sop+'</span>';
    } else {
      statusBar.innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:var(--yellow);display:inline-block"></span>'
        +'<span style="color:var(--yellow)">Fora de linha</span>';
    }
    card.appendChild(statusBar);

    // Cylinders section
    if(cab.cils&&cab.cils.length){
      var cilDiv=document.createElement('div');
      cilDiv.style.cssText='border-top:1px solid var(--border);padding:8px 14px';
      cab.cils.forEach(function(c){
        var row=document.createElement('div');
        row.style.cssText='display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px';
        row.innerHTML='<span class="parte-pill '+pbClass(c.parte)+'" style="font-size:9px;padding:1px 5px">'+c.parte+'</span>'
          +'<span style="font-family:DM Mono,monospace;color:var(--text2)">'+c.cod+'</span>'
          +'<span style="color:var(--text3)">'+c.med+'</span>'
          +(c.tag?'<span class="tag-pill" style="font-size:9px;margin-left:auto">'+c.tag+'</span>':'');
        cilDiv.appendChild(row);
      });
      var bAddCil=document.createElement('button');bAddCil.className='btn';
      bAddCil.style.cssText='width:100%;margin-top:6px;font-size:11px;justify-content:center';
      bAddCil.innerHTML='+ Vincular cilindro';
      (function(c){bAddCil.onclick=function(){openAddCilCabeçote(c.id);};})(cab);
      cilDiv.appendChild(bAddCil);
      card.appendChild(cilDiv);
    } else {
      var noCil=document.createElement('div');
      noCil.style.cssText='border-top:1px solid var(--border);padding:8px 14px';
      var bAddCil2=document.createElement('button');bAddCil2.className='btn';
      bAddCil2.style.cssText='width:100%;font-size:11px;justify-content:center';
      bAddCil2.innerHTML='+ Vincular cilindro';
      (function(c){bAddCil2.onclick=function(){openAddCilCabeçote(c.id);};})(cab);
      noCil.appendChild(bAddCil2);card.appendChild(noCil);
    }

    // Obs
    if(cab.obs){
      var obsDiv=document.createElement('div');
      obsDiv.style.cssText='border-top:1px solid var(--border);padding:6px 14px;font-size:11px;color:var(--text3);font-style:italic';
      obsDiv.textContent=cab.obs;
      card.appendChild(obsDiv);
    }

    grid.appendChild(card);
  });
  content.appendChild(grid);

  main.innerHTML='';
  main.appendChild(topbar);
  main.appendChild(content);
}

function openNewCabeçote(){
  var filialKey=currentFilial||'matriz';
  var h='<div class="modal-title">Novo cabeçote</div>';
  h+='<div class="grid2">';
  h+='<div class="form-row"><label class="form-label">Código</label><input type="text" id="f-cab-cod" placeholder="CAB-050"></div>';
  h+='<div class="form-row"><label class="form-label">Modelo</label><input type="text" id="f-cab-mod" placeholder="4X90, SMPS..."></div>';
  h+='</div>';
  h+='<div class="form-row"><label class="form-label">SOP alocada (deixe vazio se fora de linha)</label><input type="text" id="f-cab-sop" placeholder="SOP-039"></div>';
  h+='<div class="form-row"><label class="form-label">Observações</label><input type="text" id="f-cab-obs" placeholder="Opcional"></div>';
  h+='<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" id="btn-save-cab">Adicionar</button></div>';
  showModal(h);
  document.getElementById('btn-save-cab').onclick=function(){
    var cod=document.getElementById('f-cab-cod').value.trim().toUpperCase();
    if(!cod)return;
    var newCab={
      id:'cb_'+Date.now(),
      cod:cod,
      modelo:document.getElementById('f-cab-mod').value.trim(),
      sop:document.getElementById('f-cab-sop').value.trim().toUpperCase(),
      filial:filialKey,
      cils:[],
      obs:document.getElementById('f-cab-obs').value.trim()
    };
    cabeçotes.push(newCab);
    closeModal();showToast('Cabeçote adicionado');gasSave();renderCabeçotes();
  };
}

function openEditCabeçote(id){
  var cab=cabeçotes.find(function(c){return c.id===id;});if(!cab)return;
  var h='<div class="modal-title">Editar '+cab.cod+'</div>';

function renderCronograma(){
  var main=document.getElementById('main-content');
  var today=new Date();
  today.setHours(0,0,0,0);

  /* Build schedule entries from machines */
  var entries=[];
  Object.keys(machines).forEach(function(mName){
    var mach=machines[mName];
    mach.cils.forEach(function(c){
      var per=(CONFIG.periodicidade&&CONFIG.periodicidade[c.parte])||180;
      var instaladoDate=c.instalado?new Date(c.instalado):null;
      var diasInstalado=instaladoDate?Math.round((today-instaladoDate)/864e5):null;
      var proximaTroca=null;
      var diasRestantes=null;
      if(instaladoDate){
        proximaTroca=new Date(instaladoDate);
        proximaTroca.setDate(proximaTroca.getDate()+per);
        diasRestantes=Math.round((proximaTroca-today)/864e5);
      }
      entries.push({
        m:mName,
        c:c,
        per:per,
        instaladoDate:instaladoDate,
        diasInstalado:diasInstalado,
        proximaTroca:proximaTroca,
        diasRestantes:diasRestantes,
        posL:c.posicao==='dir'?'Mesa 01':c.posicao==='esq'?'Mesa 02':'Sistema comum'
      });
    });
  });

  /* Sort: vencido first, then by diasRestantes asc, then no date last */
  entries.sort(function(a,b){
    if(a.diasRestantes===null&&b.diasRestantes===null)return 0;
    if(a.diasRestantes===null)return 1;
    if(b.diasRestantes===null)return -1;
    return a.diasRestantes-b.diasRestantes;
  });

  /* Counts */
  var vencido=entries.filter(function(e){return e.diasRestantes!==null&&e.diasRestantes<0;}).length;
  var urgente=entries.filter(function(e){return e.diasRestantes!==null&&e.diasRestantes>=0&&e.diasRestantes<=30;}).length;
  var proximo=entries.filter(function(e){return e.diasRestantes!==null&&e.diasRestantes>30&&e.diasRestantes<=90;}).length;
  var ok=entries.filter(function(e){return e.diasRestantes!==null&&e.diasRestantes>90;}).length;
  var semData=entries.filter(function(e){return e.diasRestantes===null;}).length;

  /* Filter state */
  var filtro=window._cronoFiltro||'todos';

  var filtered=entries.filter(function(e){
    if(filtro==='vencido')return e.diasRestantes!==null&&e.diasRestantes<0;
    if(filtro==='urgente')return e.diasRestantes!==null&&e.diasRestantes>=0&&e.diasRestantes<=30;
    if(filtro==='proximo')return e.diasRestantes!==null&&e.diasRestantes>30&&e.diasRestantes<=90;
    if(filtro==='ok')return e.diasRestantes!==null&&e.diasRestantes>90;
    if(filtro==='semdata')return e.diasRestantes===null;
    return true;
  });

  /* Group by machine */
  var byMachine={};
  filtered.forEach(function(e){
    if(!byMachine[e.m])byMachine[e.m]=[];
    byMachine[e.m].push(e);
  });

  /* ── Build DOM ── */
  var topbar=document.createElement('div');topbar.className='topbar';
  topbar.innerHTML='<span class="page-title">Cronograma de Manuten\u00e7\u00f5es</span>'
    +'<div class="topbar-actions"><button class="btn" onclick="showPage(\'config\')">'
    +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" style="width:13px;height:13px;stroke-width:2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
    +' Periodicidade</button></div>';

  var content=document.createElement('div');content.className='content';

  /* summary cards */
  var mg=document.createElement('div');mg.className='metrics-grid';mg.style.marginBottom='20px';
  [{v:vencido,l:'Vencidos',c:'mv-red',s:'ultrapassaram o prazo'},{v:urgente,l:'Urgentes',c:'mv-yellow',s:'pr\u00f3ximos 30 dias'},{v:proximo,l:'Pr\u00f3ximos',c:'mv-blue',s:'31 a 90 dias'},{v:ok,l:'Em dia',c:'mv-green',s:'mais de 90 dias'}].forEach(function(m){
    var card=document.createElement('div');card.className='metric-card';
    card.innerHTML='<div class="metric-label">'+m.l+'</div><div class="metric-value '+m.c+'">'+m.v+'</div><div class="metric-sub">'+m.s+'</div>';
    mg.appendChild(card);
  });
  content.appendChild(mg);

  /* filter bar */
  var fb=document.createElement('div');fb.className='filters';fb.style.marginBottom='16px';
  [{k:'todos',l:'Todos ('+entries.length+')'},{k:'vencido',l:'Vencidos ('+vencido+')'},{k:'urgente',l:'Urgentes ('+urgente+')'},{k:'proximo',l:'Pr\u00f3ximos ('+proximo+')'},{k:'ok',l:'Em dia ('+ok+')'},{k:'semdata',l:'Sem data ('+semData+')'}].forEach(function(x){
    var b=document.createElement('button');b.className='filter-btn'+(filtro===x.k?' on':'');
    b.textContent=x.l;
    (function(k){b.onclick=function(){window._cronoFiltro=k;renderCronograma();};})(x.k);
    fb.appendChild(b);
  });
  content.appendChild(fb);

  if(!filtered.length){
    var empty=document.createElement('div');empty.className='empty-state';
    empty.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><p>Nenhum item nesta categoria</p>';
    content.appendChild(empty);
  }

  /* machines grouped */
  Object.keys(byMachine).sort().forEach(function(mName){
    var mEntries=byMachine[mName];
    var mach=machines[mName];

    var section=document.createElement('div');section.style.marginBottom='16px';

    /* machine header */
    var mhdr=document.createElement('div');
    mhdr.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:8px';
    mhdr.innerHTML='<span style="font-size:13px;font-weight:600;color:var(--text)">'
      +mName+'</span>'
      +'<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;background:var(--'+(mach&&mach.tipo==='dupla'?'purple':'bg4')+'-bg);color:var(--'+(mach&&mach.tipo==='dupla'?'purple':'text3')+');">'
      +(mach&&mach.tipo==='dupla'?'Mesa dupla':'Mesa simples')+'</span>';
    section.appendChild(mhdr);

    /* table */
    var tw=document.createElement('div');tw.className='table-wrap';
    var tbl=document.createElement('table');tbl.style.tableLayout='fixed';
    tbl.innerHTML='<thead><tr>'
      +'<th style="width:140px">Parte</th>'
      +'<th style="width:90px">Posi\u00e7\u00e3o</th>'
      +'<th style="width:80px">C\u00f3digo</th>'
      +'<th style="width:70px">TAG</th>'
      +'<th style="width:90px;text-align:center">Instalado</th>'
      +'<th style="width:70px;text-align:center">Dias uso</th>'
      +'<th style="width:80px;text-align:center">Periodicidade</th>'
      +'<th style="width:100px;text-align:center">Pr\u00f3xima troca</th>'
      +'<th style="width:80px;text-align:center">Restam</th>'
      +'<th style="width:80px;text-align:center">Status</th>'
      +'</tr></thead>';
    var tbody=document.createElement('tbody');

    mEntries.forEach(function(e){
      var c=e.c;
      var tr=document.createElement('tr');

      /* status badge */
      var stLabel,stBg,stCl;
      if(e.diasRestantes===null){stLabel='Sem data';stBg='var(--bg4)';stCl='var(--text3)';}
      else if(e.diasRestantes<0){stLabel='Vencido';stBg='var(--red-bg)';stCl='var(--red)';}
      else if(e.diasRestantes<=30){stLabel='Urgente';stBg='var(--yellow-bg)';stCl='var(--yellow)';}
      else if(e.diasRestantes<=90){stLabel='Pr\u00f3ximo';stBg='var(--blue-bg)';stCl='var(--blue)';}
      else{stLabel='Em dia';stBg='var(--green-bg)';stCl='var(--green)';}

      /* row accent */
      if(e.diasRestantes!==null&&e.diasRestantes<0)tr.className='row-accent-red';
      else if(e.diasRestantes!==null&&e.diasRestantes<=30)tr.className='row-accent-yellow';
      else tr.className='row-accent-green';

      /* fmt date */
      function fmtD(d){if(!d)return '\u2014';var dd=String(d.getDate()).padStart(2,'0');var mm=String(d.getMonth()+1).padStart(2,'0');var yy=d.getFullYear();return dd+'/'+mm+'/'+yy;}

      tr.innerHTML=
        '<td><span class="parte-pill '+pbClass(c.parte)+'">'+c.parte+'</span></td>'
        +'<td style="font-size:12px;color:var(--text2)">'+e.posL+'</td>'
        +'<td style="font-family:DM Mono,monospace;font-size:11px;color:var(--text2)">'+c.cod+'</td>'
        +'<td>'+(c.tag?'<span class="tag-pill" style="font-size:9px;padding:1px 6px">'+c.tag+'</span>':'<span style="color:var(--text3);font-size:11px">\u2014</span>')+'</td>'
        +'<td style="text-align:center;font-size:12px;color:var(--text2)">'+fmtD(e.instaladoDate)+'</td>'
        +'<td style="text-align:center;font-weight:600;color:'+(e.diasInstalado===null?'var(--text3)':e.diasInstalado>e.per?'var(--red)':e.diasInstalado>e.per*0.8?'var(--yellow)':'var(--text)')+'">'+(e.diasInstalado!==null?e.diasInstalado+'d':'\u2014')+'</td>'
        +'<td style="text-align:center;font-size:12px;color:var(--text3)">'+e.per+'d</td>'
        +'<td style="text-align:center;font-size:12px;color:var(--text2)">'+fmtD(e.proximaTroca)+'</td>'
        +'<td style="text-align:center;font-weight:700;color:'+stCl+'">'+(e.diasRestantes!==null?(e.diasRestantes<0?Math.abs(e.diasRestantes)+'d atr':e.diasRestantes+'d'):'\u2014')+'</td>'
        +'<td style="text-align:center"><span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;background:'+stBg+';color:'+stCl+'">'+stLabel+'</span></td>';

      tbody.appendChild(tr);
    });

    tbl.appendChild(tbody);tw.appendChild(tbl);section.appendChild(tw);
    content.appendChild(section);
  });

  main.innerHTML='';
  main.appendChild(topbar);
  main.appendChild(content);
}

function gasGetFilialKey(){
  if(currentFilial&&FILIAIS[currentFilial])return FILIAIS[currentFilial].nome;
  return 'G&G MATRIZ';
}


function gasLoad(){
  if(!GAS_URL){showToast('Configure a URL do Google Script em Configurações','var(--red)');return;}
  var filial=gasGetFilialKey();
  var url=GAS_URL+'?action=load&filial='+encodeURIComponent(filial)+'&callback=_cbLoad';
  var script=document.createElement('script');
  script.src=url;
  window._cbLoad=function(data){
    document.body.removeChild(script);
    if(!data||typeof data!=='object'){showToast('Nenhum dado encontrado na nuvem','var(--yellow)');return;}
    // Show confirmation modal
    var h='<div class="modal-title">Carregar da nuvem</div>';
    h+='<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--text2)">';
    h+='Filial: <strong style="color:var(--text)">'+gasGetFilialKey()+'</strong><br>';
    if(data.inventario)h+=(data.inventario.length||0)+' itens de inventário · ';
    if(data.consertos)h+=(data.consertos.length||0)+' consertos · ';
    if(data.machines)h+=Object.keys(data.machines).length+' máquinas';
    h+='</div>';
    h+='<div style="background:var(--red-bg);border:1px solid rgba(239,68,68,0.25);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:14px">⚠ Substituirá todos os dados atuais.</div>';
    h+='<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" id="btn-gas-confirm">Carregar</button></div>';
    showModal(h);
    var savedData=data;
    document.getElementById('btn-gas-confirm').onclick=function(){
      if(savedData.inventario)inventario=savedData.inventario;
      if(savedData.consertos)consertos=savedData.consertos;
      if(savedData.machines){
        Object.keys(savedData.machines).forEach(function(m){
          machines[m]=savedData.machines[m];
          if(!expanded.hasOwnProperty(m))expanded[m]=false;
        });
      }
      if(savedData.config)Object.assign(CONFIG,savedData.config);
      closeModal();
      showToast('Dados carregados da nuvem ☁','var(--green)');
      showPage(currentPage||'dashboard');
      updateBadges();
    };
  };
  document.body.appendChild(script);
}

function saveConfig(){
  var gasEl=document.getElementById('cfg-gas-url');if(gasEl)GAS_URL=gasEl.value.trim();
  CONFIG.dias_alerta_conserto=parseInt(document.getElementById('cfg-dias').value)||30;
  var partes=['Fechamento','Mandril','Rebarbador','Avanço/Recuo de Mesa','Elevação Extrusora','Programador','Bloco de Amortecimento','Outro'];
  partes.forEach(function(p){
    var el=document.getElementById('cfg-per-'+p.replace(/[^a-z]/gi,'_'));
    if(el)CONFIG.periodicidade[p]=parseInt(el.value)||180;
  });
  showToast('Configurações salvas');updateBadges();gasSave();
}
function exportData(){
  var blob=new Blob([JSON.stringify({inventario:inventario,consertos:consertos,machines:machines,config:CONFIG},null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cilindrosys_backup.json';a.click();
  showToast('Dados exportados');
}

function importData(){
  var input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result);
        if(!data.inventario||!data.machines){showToast('Arquivo inválido','var(--red)');return;}
        var h='<div class="modal-title">Importar backup</div>';
        h+='<div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:14px;font-size:12px;color:var(--text2);line-height:1.8">';
        h+='<strong style="color:var(--text)">'+file.name+'</strong><br>';
        h+=Object.keys(data.machines).length+' máquinas · '+data.inventario.length+' inventário · '+(data.consertos||[]).length+' consertos';
        h+='</div>';
        h+='<div style="background:var(--red-bg);border:1px solid rgba(239,68,68,0.25);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:14px">';
        h+='⚠️ Substituirá TODOS os dados atuais. Esta ação não pode ser desfeita.';
        h+='</div>';
        h+='<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" id="btn-imp-ok">Confirmar importação</button></div>';
        showModal(h);
        var savedData=data;
        document.getElementById('btn-imp-ok').onclick=function(){
          inventario=savedData.inventario||[];
          consertos=savedData.consertos||[];
          Object.keys(savedData.machines).forEach(function(m){
            machines[m]=savedData.machines[m];
            if(!expanded.hasOwnProperty(m))expanded[m]=false;
          });
          if(savedData.config)Object.assign(CONFIG,savedData.config);
          closeModal();
          showToast('Backup importado com sucesso!','var(--green)');
          showPage(currentPage||'dashboard');
          updateBadges();
        };
      }catch(err){showToast('Erro ao ler arquivo: '+err.message,'var(--red)');}
    };
    reader.readAsText(file);
  };
  input.click();
}

      '<div class="filial-card-maq">'+f.maquinas.length+' máquinas</div>'+
      '<div class="filial-card-bar" style="background:'+col.sigla+'"></div>';
    (function(k,c){
      card.onclick=function(){enterFilial(k,c.sigla);};
    })(key,col);
    cards.appendChild(card);
  });
}

function enterFilial(key){
  currentFilial=key;
  var f=FILIAIS[key];
  var colors={'matriz':'#3d7fff','minas':'#22c55e','rio':'#f97316'};
  var col=colors[key]||'var(--accent)';
  // update brand
  var brandEl=document.getElementById('brand-filial');
  if(brandEl){brandEl.textContent=f.nome;brandEl.style.color=col;}
  // hide lobby, show app
  document.getElementById('lobby').style.display='none';
  document.querySelector('.app').style.display='flex';
  // set filial machines
  window._filialMaquinas=f.maquinas.slice();
  // Show dashboard immediately
  showPage('dashboard');
  updateBadges();
  // Load cloud data in background
  setSaveStatus('','Verificando...');
  var cbName='_cbEnter_'+Date.now();
  var url=GAS_URL+'?action=load&filial='+encodeURIComponent(f.nome)+'&callback='+cbName;
  var el=document.createElement('script');
  var done=false;
  var tout=setTimeout(function(){if(!done){done=true;cleanup();setSaveStatus('','Sem dados na nuvem');}},8000);
  window[cbName]=function(data){
    if(done)return;done=true;cleanup();
    if(data&&data.savedAt){
      if(data.inventario)inventario=data.inventario;
      if(data.consertos)consertos=data.consertos;
      if(data.machines)Object.keys(data.machines).forEach(function(m){machines[m]=data.machines[m];if(!expanded.hasOwnProperty(m))expanded[m]=false;});
      if(data.cabeçotes)cabeçotes=data.cabeçotes;
      if(data.config)Object.assign(CONFIG,data.config);
      _lastSavedAt=data.savedAt;
      var d=new Date(data.savedAt);
      setSaveStatus('saved','Atualizado: '+d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}));
      showPage(currentPage||'dashboard');
      updateBadges();
    } else {
      setSaveStatus('','Sem dados na nuvem');
    }
  };
  function cleanup(){clearTimeout(tout);delete window[cbName];if(el.parentNode)el.parentNode.removeChild(el);}
  el.onerror=function(){if(!done){done=true;cleanup();setSaveStatus('','Sem conexão');}};
  el.src=url;
  document.head.appendChild(el);
}


function getMaquinas(){
  if(!window._filialMaquinas)return MLIST;
  // Only machines that belong to this filial AND are in MLIST
  return window._filialMaquinas.filter(function(m){return MLIST.indexOf(m)>=0;});
}


async function autoRefresh(){
  if(!GAS_URL||!currentFilial)return;
  try{
    var filial=gasGetFilialKey();
    var res=await new Promise(function(resolve){
      var cbName='_cbRefresh_'+Date.now();
      var url=GAS_URL+'?action=load&filial='+encodeURIComponent(filial)+'&callback='+cbName;
      var el=document.createElement('script');
      var done=false;
      var timeout=setTimeout(function(){if(!done){done=true;cleanup();resolve(null);}},8000);
      window[cbName]=function(data){if(done)return;done=true;cleanup();resolve(data);};
      function cleanup(){clearTimeout(timeout);delete window[cbName];if(el.parentNode)el.parentNode.removeChild(el);}
      el.onerror=function(){if(!done){done=true;cleanup();resolve(null);}};
      el.src=url;document.head.appendChild(el);
    });
    if(res&&res.savedAt&&res.savedAt!==_lastSavedAt){
      if(res.inventario)inventario=res.inventario;
      if(res.consertos)consertos=res.consertos;
      if(res.machines)Object.keys(res.machines).forEach(function(m){machines[m]=res.machines[m];if(!expanded.hasOwnProperty(m))expanded[m]=false;});
      if(res.cabeçotes)cabeçotes=res.cabeçotes;
      if(res.config)Object.assign(CONFIG,res.config);
      _lastSavedAt=res.savedAt;
      updateBadges();
      if(currentPage)showPage(currentPage);
      var d=new Date(res.savedAt);
      setSaveStatus('saved','Atualizado: '+d.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}));
    }
  }catch(e){}
}

document.addEventListener('DOMContentLoaded',function(){
  var lobby=document.getElementById('lobby');
  if(lobby)lobby.style.display='flex';
  document.querySelector('.app').style.display='none';
  renderLobby();
  setInterval(autoRefresh, 2*60*1000);
});

</script>
